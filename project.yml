name: PhoenixBrowser
options:
  bundleIdPrefix: com.exsavior
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PhoenixBrowser:
    type: application
    platform: macOS
    sources:
      - PhoenixBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.exsavior.PhoenixBrowser
        INFOPLIST_FILE: PhoenixBrowser/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhoenixBrowser/Resources/PhoenixBrowser.entitlements
        PRODUCT_NAME: Phoenix Browser
        PRODUCT_MODULE_NAME: PhoenixBrowser
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PhoenixBrowserTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - PhoenixBrowserTests
    dependencies:
      - target: PhoenixBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.exsavior.PhoenixBrowserTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Phoenix Browser.app/Contents/MacOS/Phoenix Browser"
        BUNDLE_LOADER: "$(TEST_HOST)"
